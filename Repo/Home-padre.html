<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recred - Gestión de Compra Anticipada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pizarra: '#4A6FA5',    /* Primario / Estructura */
                        dorado: '#F2B705',     /* Acento / Alertas */
                        melocoton: '#E76F51',  /* Secundario Cálido / Negativos y Bloqueos */
                        menta: '#81B29A',      /* Verde pastel / Éxitos y Activaciones */
                        fondo: '#F0F4F8',      /* Neutro Fondo (Gris azulado hiper pálido) */
                        'texto-oscuro': '#334155', /* Slate 700 */
                        'texto-claro': '#94A3B8',  /* Slate 400 */
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Variables para las sombras neumórficas calculadas sobre el #F0F4F8 */
            --shadow-light: #ffffff;
            --shadow-dark: #cdd5df;
            --dorado: #F2B705;
            --pizarra: #4A6FA5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F0F4F8;
            color: #334155;
        }

        h1,
        h2,
        h3,
        .font-urbanist {
            font-family: 'Montserrat', sans-serif;
        }

        /* --- CLASES NEUMÓRFICAS --- */

        .neu-convex {
            background-color: #F0F4F8;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            border: none;
            border-radius: 1.5rem;
        }

        .neu-concave {
            background-color: #F0F4F8;
            box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
            border: none;
            border-radius: 1rem;
        }

        .neu-btn {
            background-color: #F0F4F8;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .neu-btn:hover {
            box-shadow: 7px 7px 14px var(--shadow-dark), -7px -7px 14px var(--shadow-light);
        }

        .neu-btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        .btn-dorado {
            background-color: var(--dorado);
            color: #1F2937;
            box-shadow: 4px 4px 10px rgba(242, 183, 5, 0.3), -4px -4px 10px rgba(255, 255, 255, 0.8);
            transition: all 0.2s ease;
            border: none;
        }

        .btn-dorado:active {
            box-shadow: inset 2px 2px 5px rgba(180, 130, 0, 0.4), inset -2px -2px 5px rgba(255, 255, 255, 0.5);
            transform: scale(0.98);
        }

        .notification {
            animation: slideIn 0.5s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                transform: translate(-50%, -100%);
                opacity: 0;
            }

            to {
                transform: translate(-50%, 20px);
                opacity: 1;
            }
        }

        .item-disabled {
            filter: grayscale(1);
            opacity: 0.5;
            pointer-events: none;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .status-pendiente {
            background-color: var(--dorado);
            color: #1F2937;
        }

        .status-retirada {
            background-color: #E2E8F0;
            color: #81B29A;
        }

        /* Mentolado */

        @keyframes fadeInSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-anim {
            animation: fadeInSlide 0.6s ease-out forwards;
        }

        /* DUAL RANGE SLIDER CUSTOM CSS */
        .slider-container {
            position: relative;
            width: 100%;
            height: 30px;
        }

        .slider-track-bg {
            position: absolute;
            width: 100%;
            height: 8px;
            background-color: #F0F4F8;
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            border-radius: 4px;
            top: 50%;
            transform: translateY(-50%);
        }

        .slider-track-fill {
            position: absolute;
            height: 8px;
            background-color: var(--dorado);
            border-radius: 4px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }

        .slider-input {
            position: absolute;
            width: 100%;
            height: 100%;
            background: none;
            pointer-events: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            z-index: 2;
        }

        .slider-input::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #F0F4F8;
            pointer-events: auto;
            -webkit-appearance: none;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            cursor: pointer;
        }

        .slider-input::-moz-range-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #F0F4F8;
            pointer-events: auto;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            cursor: pointer;
        }
        

        /* ANIMACIÓN SCANNER IA */
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background-color: var(--dorado);
            box-shadow: 0 0 10px var(--dorado), 0 0 20px var(--dorado);
            animation: scan 3s linear infinite;
            z-index: 10;
        }
        
        @font-face {
            font-family: 'Dunkin';
            src: url('./Dunkin/Dunkin.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Montserrat';
            src: url('./Montserrat/Montserrat-Italic-VariableFont_wght.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }         
        
    </style>
</head>

<body class="min-h-screen relative pb-12">

    <!-- Notificación Flotante -->
    <div id="notification-container" class="fixed top-0 left-1/2 -translate-x-1/2 z-50 pointer-events-none"></div>

    <!-- Barra de Navegación -->
    <nav id="main-nav"
        class="bg-pizarra text-white sticky top-0 z-40 shadow-xl h-16 flex items-center px-4 md:px-8 justify-between transition-opacity duration-300 mb-8">
        <div class="flex items-center gap-4">
            <div onclick="navigateTo('home')"
                class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity">
                <img src="./logoHeader.png" alt="Logo Recred" class="h-10 w-auto object-contain" style="margin-bottom: 0.5rem;"
                    onerror="this.src='https://ui-avatars.com/api/?name=RC&background=F2B705&color=4A6FA5&rounded=true'">
                <span class="font-urbanist font-bold text-2xl tracking-tight text-dorado hidden sm:inline">RECRED</span>
            </div>
            <div class="hidden md:flex items-center border-l border-white/20 pl-4 ml-2">
                <span id="user-greeting" class="text-sm font-medium text-gray-100" style="font-size:1.1em">Hola, Martín</span>
            </div>
        </div>

        <div class="hidden md:flex gap-6 items-center font-medium">
            <!-- Nuevo botón Próximamente (Roadmap) -->
            <button onclick="navigateTo('roadmap')" class="neu-btn px-4 py-1.5 rounded-full text-xs font-bold text-texto-oscuro hover:text-pizarra flex items-center gap-2 transition-all">
                <i class="fa-solid fa-wand-magic-sparkles text-dorado"></i> Próximamente
            </button>
            <button onclick="navigateTo('movements')" class="text-white/80 hover:text-white transition-colors">Movimientos</button>
            <button onclick="navigateTo('cart')" class="relative p-2 hover:bg-white/10 rounded-full transition-all">
                <i class="fa-solid fa-cart-shopping text-xl text-gray-50"></i>
                <span id="cart-count"
                    class="absolute -top-1 -right-1 bg-dorado text-texto-oscuro font-bold text-[10px] w-5 h-5 flex items-center justify-center rounded-full shadow-md">0</span>
            </button>
        </div>

        <div class="md:hidden flex items-center gap-4">
            <button onclick="navigateTo('roadmap')" class="text-white/80 hover:text-dorado">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </button>
            <button class="relative p-2 text-gray-50">
                <i class="fa-regular fa-bell text-xl"></i>
                <span class="absolute top-1 right-1 w-2.5 h-2.5 border-2 border-pizarra bg-dorado rounded-full"></span>
            </button>
            <button onclick="navigateTo('cart')" class="relative p-2">
                <i class="fa-solid fa-cart-shopping text-xl text-gray-50"></i>
                <span id="cart-count-mobile"
                    class="absolute top-0 right-0 bg-dorado text-texto-oscuro font-bold text-[10px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
            </button>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <main id="app" class="max-w-[150rem] mx-auto p-4 md:px-8"></main>

    <script>
        // --- ESTADO DE LA APLICACIÓN ---
        const loggedUserName = "Martín";
        let currentView = 'intro1';
        let currentChildId = null;
        let cart = [];
        let pendingMenuQuantities = {};
        let showChildModal = false;

        let cartCheckoutData = {};
        let lastCheckoutCodes = [];
        let lastNegativeChildId = null;

        let selectedPurchaseId = null;

        let currentMinPrice = 0;
        let currentMaxPrice = 1000;

        let canteenFilters = {
            search: '',
            category: 'all',
            minSelected: 0,
            maxSelected: 1000,
            trait: 'all'
        };

        let restrictions = {
            1: { noTacc: false, noSugar: false, noPeanuts: false, vegan: false, allowedBreaks: { '1er': true, '2do': true, 'mediodia': true, 'fuera': true } },
            2: { noTacc: false, noSugar: false, noPeanuts: false, vegan: false, allowedBreaks: { '1er': true, '2do': true, 'mediodia': true, 'fuera': true } },
            3: { noTacc: false, noSugar: false, noPeanuts: false, vegan: false, allowedBreaks: { '1er': true, '2do': true, 'mediodia': true, 'fuera': true } }
        };

        let specificItemRestrictions = { 1: [], 2: [], 3: [] };

        const feriados = [
            '2026-05-01', '2026-05-25', '2026-06-20', '2026-07-09',
            '2026-09-21', '2026-10-12', '2026-11-20'
        ];

        // Mantenemos las rutas de imágenes relativas/locales originales
        const children = [
            { id: 1, name: "Julián García", year: "4to Año A", school: "Instituto San José", balance: 2580, img: "./julian.avif" },
            { id: 2, name: "Sofía García", year: "1er Año B", school: "Instituto San José", balance: 1200, img: "./sofia.webp" },
            { id: 3, name: "Mateo García", year: "6to Año C", school: "Colegio Santa María", balance: 800, img: "./mateo.jpg" }
        ];

        const productsBySchool = {
            "Instituto San José": [
                { id: 101, name: "Sándwich de Jamón y Queso", category: "Comidas", price: 1200, hasTacc: true, hasSugar: false, hasPeanuts: false, isVegan: false, img: "./Sandwich Jamón y queso.jfif" },
                { id: 102, name: "Cookies de Chocolate y Maní", category: "Snacks", price: 850, hasTacc: true, hasSugar: true, hasPeanuts: true, isVegan: false, img: "./Cookies de Chocolate y Maní.jpg" },
                { id: 103, name: "Manzana Roja", category: "Snacks", price: 300, hasTacc: false, hasSugar: false, hasPeanuts: false, isVegan: true, img: "https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?auto=format&fit=crop&w=300&q=80" },
                { id: 104, name: "Jugo de Naranja", category: "Bebidas", price: 600, hasTacc: false, hasSugar: true, hasPeanuts: false, isVegan: true, img: "https://images.unsplash.com/photo-1613478223719-2ab802602423?auto=format&fit=crop&w=300&q=80" },
                { id: 107, name: "Empanada de Carne", category: "Comidas", price: 900, hasTacc: true, hasSugar: false, hasPeanuts: false, isVegan: false, img: "./empanada de carne.webp" }
            ],
            "Colegio Santa María": [
                { id: 201, name: "Hamburguesa Completa", category: "Comidas", price: 2500, hasTacc: true, hasSugar: false, hasPeanuts: false, isVegan: false, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=300&q=80" },
                { id: 202, name: "Ensalada Fresca", category: "Comidas", price: 1800, hasTacc: false, hasSugar: false, hasPeanuts: false, isVegan: true, img: "https://images.unsplash.com/photo-1550304943-4f24f54ddde9?auto=format&fit=crop&w=300&q=80" },
                { id: 203, name: "Agua Mineral", category: "Bebidas", price: 500, hasTacc: false, hasSugar: false, hasPeanuts: false, isVegan: true, img: "./agua mineral.jpg" },
                { id: 204, name: "Barrita de Cereal Mix", category: "Snacks", price: 500, hasTacc: true, hasSugar: true, hasPeanuts: true, isVegan: true, img: "./barrita de cereal mix.webp" },
                { id: 205, name: "Yogurt con Frutas", category: "Snacks", price: 950, hasTacc: false, hasSugar: true, hasPeanuts: false, isVegan: false, img: "./yogur con frutas.jpg" }
            ]
        };

        let purchases = [
            {
                id: 10001,
                childId: 1,
                date: '2026-05-08',
                breakTime: '1er Recreo',
                total: 1200,
                status: 'Retirada',
                code: 'TIGRE',
                items: [{ name: "Sándwich de Jamón y Queso", quantity: 1, price: 1200, img: productsBySchool["Instituto San José"][0].img }]
            },
            {
                id: 10002,
                childId: 2,
                date: '2026-05-15',
                breakTime: '2do Recreo',
                total: 850,
                status: 'Pendiente',
                code: 'LOBO',
                items: [{ name: "Cookies de Chocolate y Maní", quantity: 1, price: 850, img: productsBySchool["Instituto San José"][1].img }]
            }
        ];

        document.getElementById('user-greeting').innerText = `Hola, ${loggedUserName}`;

        function getTodayString() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDisplayDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        }

        function isFeriadoOFinDeSemana(dateString) {
            const [y, m, d] = dateString.split('-');
            const date = new Date(y, m - 1, d);
            const dayOfWeek = date.getDay();
            return (dayOfWeek === 0 || dayOfWeek === 6 || feriados.includes(dateString));
        }

        function getNextValidDateStr(startDateStr = null) {
            let date = startDateStr ? new Date(startDateStr + 'T00:00:00') : new Date();
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            if (date < today) date = new Date();
            while (true) {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const dateStr = `${year}-${month}-${day}`;
                if (!isFeriadoOFinDeSemana(dateStr)) return dateStr;
                date.setDate(date.getDate() + 1);
            }
        }

        function handleIndividualDateChange(input, childId) {
            const selectedDate = input.value;
            const todayStr = getTodayString();
            if (selectedDate < todayStr) {
                showNotification("No puedes seleccionar fechas pasadas.", true);
                updateCartChildData(childId, 'date', getNextValidDateStr());
                return;
            }
            if (isFeriadoOFinDeSemana(selectedDate)) {
                showNotification("Fecha no disponible (Fin de semana o Feriado).", true);
                updateCartChildData(childId, 'date', getNextValidDateStr(selectedDate));
                return;
            }
            updateCartChildData(childId, 'date', selectedDate);
        }

        function formatCurrency(amount) {
            const isNegative = amount < 0;
            const absAmount = Math.abs(amount);
            return (isNegative ? '-$' : '$') + absAmount.toLocaleString('es-AR');
        }

        function getBalanceWarnings() {
            const warnings = [];
            const spentPerChild = {};
            cart.forEach(item => {
                if (cartCheckoutData[item.childId] && cartCheckoutData[item.childId].selected) {
                    spentPerChild[item.childId] = (spentPerChild[item.childId] || 0) + (item.price * item.quantity);
                }
            });
            for (const childId in spentPerChild) {
                const child = children.find(c => c.id == childId);
                const newBalance = child.balance - spentPerChild[childId];
                if (newBalance < 0) {
                    warnings.push({ name: child.name, newBalance: newBalance });
                }
            }
            return warnings;
        }

        function generateWithdrawalCode() {
            const animals = ["Lobo", "Tigre", "Puma", "Oso", "Gato", "Perro", "Zorro", "Rana", "Sapo", "Búho", "Pato", "Cisne", "Loro", "Pez", "Foca", "Cebra", "Morsa", "Koala", "Panda", "Gallo", "Pollo", "Ganso", "Toro", "Vaca"];
            return animals[Math.floor(Math.random() * animals.length)];
        }

        function showNotification(message, isWarning = false) {
            const container = document.getElementById('notification-container');
            const notif = document.createElement('div');
            const bgColor = isWarning ? 'bg-melocoton' : 'bg-menta';
            const icon = isWarning ? 'fa-triangle-exclamation' : 'fa-circle-check';
            notif.className = `notification mt-4 ${bgColor} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3 font-semibold z-50`;
            notif.innerHTML = `<i class="fa-solid ${icon}"></i> ${message}`;
            container.appendChild(notif);
            setTimeout(() => notif.remove(), 4000);
        }

        function navigateTo(view, params = null) {
            currentView = view;
            if (params && params.childId) {
                currentChildId = params.childId;
                pendingMenuQuantities = {};
            }
            if (view === 'movements' && (!params || !params.childId)) {
                currentChildId = null;
            }
            if (view === 'canteen') {
                const activeChild = children.find(c => c.id === currentChildId);
                const schoolProducts = productsBySchool[activeChild.school] || [];
                if (schoolProducts.length > 0) {
                    const prices = schoolProducts.map(p => p.price);
                    currentMinPrice = Math.min(...prices);
                    currentMaxPrice = Math.max(...prices);
                } else {
                    currentMinPrice = 0;
                    currentMaxPrice = 1000;
                }
                resetFiltersLogic();
            }
            if (view === 'cart') {
                initializeCartData();
            }
            render();
            window.scrollTo(0, 0);
        }

        function initializeCartData() {
            const kidsInCart = [...new Set(cart.map(i => i.childId))];
            kidsInCart.forEach(id => {
                if (!cartCheckoutData[id]) {
                    cartCheckoutData[id] = { selected: true, date: getNextValidDateStr(), breakTime: '1er Recreo' };
                }
            });
            Object.keys(cartCheckoutData).forEach(id => {
                if (!kidsInCart.includes(parseInt(id))) delete cartCheckoutData[id];
            });
        }

        function toggleCartChild(childId) {
            if (cartCheckoutData[childId]) {
                cartCheckoutData[childId].selected = !cartCheckoutData[childId].selected;
                render();
            }
        }

        function updateCartChildData(childId, field, value) {
            if (cartCheckoutData[childId]) {
                cartCheckoutData[childId][field] = value;
                if (field === 'date') render();
            }
        }

        function resetFiltersLogic() {
            canteenFilters = { search: '', category: 'all', minSelected: currentMinPrice, maxSelected: currentMaxPrice, trait: 'all' };
        }

        function resetFilters() {
            resetFiltersLogic();
            const searchInput = document.getElementById('filter-search');
            const catSelect = document.getElementById('filter-category');
            const traitSelect = document.getElementById('filter-trait');
            if (searchInput) searchInput.value = '';
            if (catSelect) catSelect.value = 'all';
            if (traitSelect) traitSelect.value = 'all';

            const sMin = document.getElementById('slider-min');
            const sMax = document.getElementById('slider-max');
            if (sMin && sMax) {
                sMin.value = currentMinPrice;
                sMax.value = currentMaxPrice;
                updateSliderVisuals();
            }
            renderCanteenGrid();
        }

        function handleFilterChange() {
            canteenFilters.search = document.getElementById('filter-search').value.toLowerCase();
            canteenFilters.category = document.getElementById('filter-category').value;
            canteenFilters.trait = document.getElementById('filter-trait').value;
            renderCanteenGrid();
        }

        function onSliderInput(type) {
            let sMin = document.getElementById('slider-min');
            let sMax = document.getElementById('slider-max');
            let valMin = parseInt(sMin.value);
            let valMax = parseInt(sMax.value);

            if (valMin >= valMax) {
                if (type === 'min') sMin.value = valMax - 100;
                if (type === 'max') sMax.value = valMin + 100;
            }

            updateSliderVisuals();
            canteenFilters.minSelected = parseInt(sMin.value);
            canteenFilters.maxSelected = parseInt(sMax.value);
            renderCanteenGrid();
        }

        function updateSliderVisuals() {
            let sMin = document.getElementById('slider-min');
            let sMax = document.getElementById('slider-max');
            let trackFill = document.getElementById('slider-track-fill');
            let displayMin = document.getElementById('display-min');
            let displayMax = document.getElementById('display-max');

            if (!sMin || !sMax) return;

            let valMin = parseInt(sMin.value);
            let valMax = parseInt(sMax.value);

            displayMin.innerText = valMin;
            displayMax.innerText = valMax;

            let percentMin = ((valMin - sMin.min) / (sMin.max - sMin.min)) * 100;
            let percentMax = ((valMax - sMax.min) / (sMax.max - sMax.min)) * 100;

            if (trackFill) {
                trackFill.style.left = percentMin + "%";
                trackFill.style.width = (percentMax - percentMin) + "%";
            }
        }

        function toggleBreakRestriction(childId, breakKey) {
            restrictions[childId].allowedBreaks[breakKey] = !restrictions[childId].allowedBreaks[breakKey];
            render();
        }

        function toggleItemRestriction(productId) {
            const blockedArray = specificItemRestrictions[currentChildId];
            const index = blockedArray.indexOf(parseInt(productId));
            
            if (index > -1) {
                blockedArray.splice(index, 1);
                showNotification("Restricción individual eliminada.");
            } else {
                blockedArray.push(parseInt(productId));
                showNotification("Ítem restringido manualmente.", true);
                removeFromCart(productId, currentChildId);
                if (pendingMenuQuantities[productId]) {
                    delete pendingMenuQuantities[productId];
                }
            }
            renderCanteenGrid();

        function renderCanteenGrid() {
            const gridContainer = document.getElementById('canteen-grid');
            if (!gridContainer) return;

            const activeChildCant = children.find(c => c.id === currentChildId);
            const activeRestr = restrictions[currentChildId];
            let schoolProducts = productsBySchool[activeChildCant.school] || [];

            if (canteenFilters.search !== '') schoolProducts = schoolProducts.filter(p => p.name.toLowerCase().includes(canteenFilters.search));
            if (canteenFilters.category !== 'all') schoolProducts = schoolProducts.filter(p => p.category === canteenFilters.category);
            schoolProducts = schoolProducts.filter(p => p.price >= canteenFilters.minSelected && p.price <= canteenFilters.maxSelected);
            if (canteenFilters.trait !== 'all') {
                schoolProducts = schoolProducts.filter(p => {
                    if (canteenFilters.trait === 'notacc') return !p.hasTacc;
                    if (canteenFilters.trait === 'nosugar') return !p.hasSugar;
                    if (canteenFilters.trait === 'nopeanuts') return !p.hasPeanuts;
                    if (canteenFilters.trait === 'vegan') return p.isVegan;
                    return true;
                });
            }

            if (schoolProducts.length === 0) {
                gridContainer.innerHTML = `
                    <div class="col-span-full py-16 text-center neu-convex">
                        <i class="fa-solid fa-face-frown-open text-5xl text-texto-claro mb-4"></i>
                        <p class="text-texto-oscuro text-lg font-medium">No se encontraron productos con estos filtros.</p>
                        <button onclick="resetFilters()" class="mt-6 neu-btn text-pizarra px-8 py-3 font-bold"><i class="fa-solid fa-rotate-right mr-2"></i>Limpiar Filtros</button>

                return;

                if (isSpecificallyBlocked) blockReason = "Restringido manualmente";
                else if (activeRestr.noTacc && p.hasTacc) blockReason = "Contiene TACC";
                else if (activeRestr.noSugar && p.hasSugar) blockReason = "Contiene Azúcar";
                else if (activeRestr.noPeanuts && p.hasPeanuts) blockReason = "Contiene Maní";
                else if (activeRestr.vegan && !p.isVegan) blockReason = "No es Vegano";

                const isDisabled = blockReason !== "";
                const inCartItem = cart.find(i => i.id === p.id && i.childId === currentChildId);

        function openChildModal() { showChildModal = true; render(); }
        function closeChildModal() { showChildModal = false; render(); }
        function switchChild(newId) {
            currentChildId = newId;
            showChildModal = false;
            pendingMenuQuantities = {};
            const activeChild = children.find(c => c.id === currentChildId);
            const schoolProducts = productsBySchool[activeChild.school] || [];
            if (schoolProducts.length > 0) {
                const prices = schoolProducts.map(p => p.price);
                currentMinPrice = Math.min(...prices);
                currentMaxPrice = Math.max(...prices);
            }
            resetFiltersLogic();
            render();
        }

        function openPurchaseDetails(id) { selectedPurchaseId = id; render(); }
        function closePurchaseDetails() { selectedPurchaseId = null; render(); }

        function changeMenuQuantity(productId, delta) {
            const cartItem = cart.find(i => i.id === productId && i.childId === currentChildId);
            if (cartItem) {
                updateQuantity(productId, currentChildId, delta);
            } else {
                if (!pendingMenuQuantities[productId]) pendingMenuQuantities[productId] = 1;
                pendingMenuQuantities[productId] += delta;
                if (pendingMenuQuantities[productId] < 1) pendingMenuQuantities[productId] = 1;
                renderCanteenGrid();
            }
        }

        function addToCart(productId) {
            const allProducts = Object.values(productsBySchool).flat();
            const product = allProducts.find(p => p.id === productId);
            const inCart = cart.find(item => item.id === productId && item.childId === currentChildId);
            const qtyToAdd = pendingMenuQuantities[productId] || 1;

            if (inCart) {
                inCart.quantity = qtyToAdd;
            } else {
                cart.push({ ...product, quantity: qtyToAdd, childId: currentChildId });
            }

            updateCartUI();
            showNotification(`Se agregaron ${qtyToAdd}x "${product.name}" al carrito`);
            renderCanteenGrid();
        }

        function updateQuantity(productId, childId, delta) {
            const item = cart.find(i => i.id === productId && i.childId === childId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(productId, childId);
                    return;
                }
            }
            if (currentView === 'canteen') renderCanteenGrid();
            else render();
            updateCartUI();
        }

        function removeFromCart(productId, childId) {
            cart = cart.filter(item => !(item.id === productId && item.childId === childId));
            const remainingItemsForChild = cart.some(item => item.childId === childId);
            if (!remainingItemsForChild && cartCheckoutData[childId]) delete cartCheckoutData[childId];
            if (currentView === 'canteen') renderCanteenGrid();
            else render();
            updateCartUI();
        }

        function emptyCart() {
            cart = [];
            cartCheckoutData = {};
            updateCartUI();
            render();
        }

        function updateCartUI() {
            const count = cart.reduce((acc, item) => acc + item.quantity, 0);
            const cartCountElem = document.getElementById('cart-count');
            const cartCountMobileElem = document.getElementById('cart-count-mobile');
            if (cartCountElem) cartCountElem.innerText = count;
            if (cartCountMobileElem) cartCountMobileElem.innerText = count;
        }

        function goToConfirm() { navigateTo('confirm'); }

        function processPurchase() {
            const itemsToProcess = cart.filter(item => cartCheckoutData[item.childId] && cartCheckoutData[item.childId].selected);
            const itemsToKeep = cart.filter(item => !(cartCheckoutData[item.childId] && cartCheckoutData[item.childId].selected));

            const spentPerChild = {};
            const groupedCart = itemsToProcess.reduce((acc, item) => {
                if (!acc[item.childId]) acc[item.childId] = [];
                acc[item.childId].push(item);
                spentPerChild[item.childId] = (spentPerChild[item.childId] || 0) + (item.price * item.quantity);
                return acc;
            }, {});

            lastCheckoutCodes = [];
            lastNegativeChildId = null;

            Object.keys(groupedCart).forEach(childId => {
                const child = children.find(c => c.id == childId);
                const childTotal = spentPerChild[childId];
                const childData = cartCheckoutData[childId];
                const code = generateWithdrawalCode().toUpperCase();

                if (child) {
                    child.balance -= childTotal;
                    if (child.balance < 0 && !lastNegativeChildId) {
                        lastNegativeChildId = child.id;
                    }
                }

                const newPurchase = {
                    id: Date.now() + Math.floor(Math.random() * 1000),
                    childId: parseInt(childId),
                    date: childData.date,
                    breakTime: childData.breakTime,
                    total: childTotal,
                    status: 'Pendiente',
                    code: code,
                    items: [...groupedCart[childId]]
                };
                purchases.unshift(newPurchase);
                lastCheckoutCodes.push({ childName: child.name, img: child.img, code: code });
            });

            cart = itemsToKeep;
            Object.keys(groupedCart).forEach(childId => delete cartCheckoutData[childId]);
            updateCartUI();
            navigateTo('success');
        }

                    }).join('')}
                                    
                                    <div class="border-t border-gray-300/40 pt-8 flex justify-between items-center">
                                        <span class="text-texto-claro font-bold uppercase tracking-widest text-sm">Total a Pagar</span>
                                        <span class="text-pizarra font-black text-4xl">$${confirmCartTotal.toLocaleString('es-AR')}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="flex flex-col gap-5">
                                <button onclick="processPurchase()" class="w-full btn-dorado font-black tracking-widest uppercase py-5 text-xl flex items-center justify-center gap-3 rounded-2xl"><i class="fa-solid fa-lock text-base"></i> Confirmar y Pagar</button>
                                <div class="grid grid-cols-2 gap-5">
                                    <button onclick="navigateTo('cart')" class="neu-btn text-texto-claro font-bold py-4 rounded-xl text-sm uppercase tracking-widest">Volver al carrito</button>
                                    <button onclick="navigateTo('home')" class="neu-btn text-pizarra font-bold py-4 rounded-xl text-sm uppercase tracking-widest">Cancelar y salir</button>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'success':
                    const codesHTML = lastCheckoutCodes.map(data => `
                        <div class="neu-convex p-5 mb-5 flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <div class="neu-concave p-1.5 rounded-full"><img src="${data.img}" class="w-12 h-12 rounded-full object-cover"></div>
                                <span class="font-bold text-texto-oscuro text-lg">${data.childName}</span>
                            </div>
                            <div class="neu-concave px-6 py-3 text-right">
                                <span class="block text-[10px] text-texto-claro uppercase font-black tracking-widest mb-1">CÓDIGO</span>
                                <span class="font-black text-dorado text-3xl tracking-widest" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">${data.code}</span>
                            </div>
                        </div>
                    `).join('');

                    app.innerHTML = `
                        <div class="max-w-2xl mx-auto py-8">
                            <div class="text-center mb-12">
                                <div class="w-28 h-28 neu-convex text-menta flex items-center justify-center text-5xl mx-auto mb-8 rounded-full">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                                <h2 class="text-5xl font-black text-pizarra mb-4">¡Pago Realizado!</h2>
                                <p class="text-texto-claro text-xl font-bold">Los pedidos seleccionados fueron registrados.</p>
                            </div>
                            
                            <div class="neu-convex p-10 mb-12 relative">
                                <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-pizarra text-dorado px-8 py-2 rounded-full text-xs font-black uppercase tracking-widest w-max shadow-md border-2 border-pizarra">Códigos de Retiro</div>
                                <p class="text-sm text-texto-claro mb-8 text-center mt-4 font-medium">Dile a cada hijo su código correspondiente para retirar en cantina:</p>
                                
                                <div>
                                    ${codesHTML}
                                </div>
                            </div>

                            <div class="space-y-5">
                                ${lastNegativeChildId ? `<button onclick="navigateTo('recharge', {childId: ${lastNegativeChildId}})" class="w-full btn-dorado font-black py-5 text-lg flex items-center justify-center gap-3 rounded-2xl uppercase tracking-widest"><i class="fa-solid fa-wallet"></i> Cargar Saldo Ahora</button>` : ''}
                                ${cart.length > 0 ? `<button onclick="navigateTo('cart')" class="w-full neu-btn text-texto-oscuro font-bold py-5 rounded-2xl flex items-center justify-center gap-2">Volver al carrito (Pedidos en espera)</button>` : ''}
                                <button onclick="navigateTo('pending')" class="w-full neu-btn text-pizarra font-bold py-5 rounded-2xl">Ver compras pendientes de retiro</button>
                                <button onclick="navigateTo('home')" class="w-full neu-btn text-texto-claro font-bold py-5 rounded-2xl">Volver al Inicio</button>
                            </div>
                        </div>
                    `;
                    break;
            }
        }

        render();
    </script>

</body>

</html>
